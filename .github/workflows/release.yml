name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Fetch Cobblemon (Fabric 1.7.3+1.21.1) for compiling against
        run: |
          mkdir -p libs
          curl -sL -o "libs/Cobblemon-fabric-1.7.3+1.21.1.jar" \
            "https://cdn.modrinth.com/data/MdwFAVRL/versions/kF7CvxTo/Cobblemon-fabric-1.7.3%2B1.21.1.jar"

      - run: chmod +x gradlew
      - run: ./gradlew build --console=plain

      - name: Locate built jar
        id: jar
        run: echo "path=$(ls build/libs/*.jar | head -1)" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.path }}
          generate_release_notes: true
